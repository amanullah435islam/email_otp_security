<!DOCTYPE html>
<html>
<head>
    <title>Passkey Test</title>
</head>
<body>

<h2>Passkey Test</h2>

<input type="email" id="email" placeholder="Enter Email">
<br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<script>
// ✅ FIXED Base64URL decode
function bufferDecode(value) {
    value = value.replace(/-/g, '+').replace(/_/g, '/');
    while (value.length % 4) value += '=';
    return Uint8Array.from(atob(value), c => c.charCodeAt(0));
}

// ✅ FIXED encode
function bufferEncode(value) {
    return btoa(String.fromCharCode(...new Uint8Array(value)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=/g, '');
}

async function register() {

    const email = document.getElementById("email").value;

    // 1. challenge
    let res = await fetch("http://localhost:8080/auth/passkey/register-challenge", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
    });

    let options = await res.json();

    // decode
    options.challenge = bufferDecode(options.challenge);
    options.user.id = bufferDecode(options.user.id);

    // 🔥 IMPORTANT FIX
    if (options.excludeCredentials) {
        options.excludeCredentials = options.excludeCredentials.map(c => ({
            ...c,
            id: bufferDecode(c.id)
        }));
    }

    // 2. create credential
    const credential = await navigator.credentials.create({
        publicKey: options
    });

//    AmAnUllAh2024

    console.log(credential);


const fixedCredential = {
    id: credential.id,
    rawId: bufferEncode(credential.rawId),
    type: credential.type,
    response: {
        clientDataJSON: bufferEncode(credential.response.clientDataJSON),
        attestationObject: bufferEncode(credential.response.attestationObject)
    },
    clientExtensionResults: {}   // 🔥 IMPORTANT
};

    // 3. SEND CLEAN DATA (NO EXTRA FIELD)
await fetch("http://localhost:8080/auth/passkey/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({

        email: email,
        //credential: credential
        credential: fixedCredential
       
    })
});

    alert("Registered Successfully");
}

// ================= LOGIN =================
async function login() {

    const email = document.getElementById("email").value;

    let res = await fetch("http://localhost:8080/auth/passkey/login-challenge", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email})
    });

    let options = await res.json();

    const publicKey = options.publicKeyCredentialRequestOptions;

    publicKey.challenge = bufferDecode(publicKey.challenge);

    if (publicKey.allowCredentials) {
        publicKey.allowCredentials = publicKey.allowCredentials.map(c => ({
            ...c,
            id: bufferDecode(c.id)
        }));
    }

    const assertion = await navigator.credentials.get({
        publicKey: publicKey
    });

    let loginRes = await fetch("http://localhost:8080/auth/passkey/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email,
            assertion: {
                id: assertion.id,
                rawId: bufferEncode(assertion.rawId),
                type: assertion.type,
                response: {
                    clientDataJSON: bufferEncode(assertion.response.clientDataJSON),
                    authenticatorData: bufferEncode(assertion.response.authenticatorData),
                    signature: bufferEncode(assertion.response.signature),
                    userHandle: assertion.response.userHandle
                        ? bufferEncode(assertion.response.userHandle)
                        : null
                },
                clientExtensionResults: {}   // 🔥 IMPORTANT
            }
            
        })
    });

    let data = await loginRes.json();

    console.log(data);

    alert("Login Done! Token: " + data.token);
}
</script>

</body>
</html>
